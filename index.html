<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BedavaOyun — Ücretsiz Oyunlar</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07070f;--panel:#0d0d1f;--cyan:#00f5ff;--pink:#ff006e;--yellow:#ffbe0b;--green:#00ff88;--dim:#3a3a5a;--text:#d0d0ff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:1000;}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
  .pixels{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .pixel{position:absolute;animation:float-up linear infinite;opacity:0;}
  @keyframes float-up{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:0.6;}90%{opacity:0.3;}100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}}
  header{position:relative;z-index:10;text-align:center;padding:48px 20px 32px;border-bottom:1px solid rgba(0,245,255,0.08);}
  .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.4rem,5vw,3rem);letter-spacing:0.15em;display:inline-block;}
  .logo-bedava{color:var(--cyan);text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan),0 0 80px rgba(0,245,255,0.3);animation:flicker 5s infinite;}
  .logo-oyun{color:var(--pink);text-shadow:0 0 10px var(--pink),0 0 30px var(--pink),0 0 80px rgba(255,0,110,0.3);animation:flicker 5s infinite 0.3s;}
  @keyframes flicker{0%,92%,100%{opacity:1}93%{opacity:.7}94%{opacity:1}96%{opacity:.5}97%{opacity:1}}
  .logo-sub{display:block;font-size:clamp(0.35rem,1.5vw,0.55rem);color:var(--dim);letter-spacing:0.3em;margin-top:12px;}
  .header-stats{display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap;}
  .stat-chip{font-size:0.38rem;color:var(--yellow);background:rgba(255,190,11,0.08);border:1px solid rgba(255,190,11,0.25);padding:6px 12px;border-radius:2px;letter-spacing:0.1em;text-shadow:0 0 8px var(--yellow);}
  .section-title{position:relative;z-index:10;text-align:center;padding:40px 20px 28px;}
  .section-title h2{font-family:'Orbitron',monospace;font-size:clamp(0.7rem,2.5vw,1.1rem);color:var(--cyan);letter-spacing:0.25em;text-shadow:0 0 12px var(--cyan);}
  .section-title h2::before,.section-title h2::after{content:' ◆ ';color:var(--pink);text-shadow:0 0 8px var(--pink);}
  .games-grid{position:relative;z-index:10;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:0 20px 60px;}
  .game-card{background:var(--panel);border:1px solid rgba(0,245,255,0.12);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;position:relative;cursor:pointer;animation:card-in 0.5s ease both;}
  @keyframes card-in{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .game-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,255,0.03) 0%,transparent 50%);pointer-events:none;}
  .game-card:hover{transform:translateY(-6px);border-color:rgba(0,245,255,0.4);box-shadow:0 0 30px rgba(0,245,255,0.12);}
  .game-card.pink:hover{border-color:rgba(255,0,110,0.4);box-shadow:0 0 30px rgba(255,0,110,0.12);}
  .game-card.green:hover{border-color:rgba(0,255,136,0.4);box-shadow:0 0 30px rgba(0,255,136,0.12);}
  .game-card.coming{opacity:0.4;pointer-events:none;}
  .card-preview{height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#060612;}
  .card-badge{position:absolute;top:10px;right:10px;font-size:0.3rem;padding:4px 8px;border-radius:2px;letter-spacing:0.1em;}
  .badge-new{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.4);color:var(--green);text-shadow:0 0 6px var(--green);}
  .badge-hot{background:rgba(255,0,110,0.15);border:1px solid rgba(255,0,110,0.4);color:var(--pink);text-shadow:0 0 6px var(--pink);animation:pulse 1.5s infinite;}
  .badge-soon{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--dim);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px;}
  .card-title{font-family:'Orbitron',monospace;font-size:clamp(0.65rem,2vw,0.85rem);font-weight:700;color:var(--cyan);text-shadow:0 0 8px rgba(0,245,255,0.5);letter-spacing:0.1em;}
  .game-card.pink .card-title{color:var(--pink);text-shadow:0 0 8px rgba(255,0,110,0.5);}
  .game-card.green .card-title{color:var(--green);text-shadow:0 0 8px rgba(0,255,136,0.5);}
  .card-desc{font-size:0.32rem;color:var(--dim);line-height:1.9;letter-spacing:0.05em;}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;}
  .tag{font-size:0.28rem;padding:3px 7px;border-radius:2px;letter-spacing:0.08em;background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.15);color:rgba(0,245,255,0.7);}
  .game-card.pink .tag{background:rgba(255,0,110,0.06);border-color:rgba(255,0,110,0.15);color:rgba(255,0,110,0.7);}
  .game-card.green .tag{background:rgba(0,255,136,0.06);border-color:rgba(0,255,136,0.15);color:rgba(0,255,136,0.7);}
  .card-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.04);}
  .play-btn{display:block;width:100%;text-align:center;padding:11px;font-family:'Press Start 2P',monospace;font-size:0.45rem;letter-spacing:0.15em;background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.3);color:var(--cyan);text-shadow:0 0 8px var(--cyan);border-radius:2px;transition:background 0.15s;cursor:pointer;}
  .play-btn:hover{background:rgba(0,245,255,0.16);}
  .game-card.pink .play-btn{background:rgba(255,0,110,0.08);border-color:rgba(255,0,110,0.3);color:var(--pink);text-shadow:0 0 8px var(--pink);}
  .game-card.pink .play-btn:hover{background:rgba(255,0,110,0.16);}
  .game-card.green .play-btn{background:rgba(0,255,136,0.08);border-color:rgba(0,255,136,0.3);color:var(--green);text-shadow:0 0 8px var(--green);}
  .game-card.green .play-btn:hover{background:rgba(0,255,136,0.16);}
  .ticker{position:relative;z-index:10;background:rgba(0,245,255,0.06);border-top:1px solid rgba(0,245,255,0.1);border-bottom:1px solid rgba(0,245,255,0.1);overflow:hidden;padding:10px 0;}
  .ticker-inner{display:flex;white-space:nowrap;animation:ticker-scroll 25s linear infinite;}
  .ticker-text{font-size:0.38rem;color:rgba(0,245,255,0.5);letter-spacing:0.2em;padding:0 40px;}
  .ticker-text span{color:var(--pink);}
  @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  footer{position:relative;z-index:10;text-align:center;padding:32px 20px;border-top:1px solid rgba(255,255,255,0.04);font-size:0.32rem;color:var(--dim);letter-spacing:0.1em;line-height:2.5;}
  /* Tetris */
  .tetris-scene{width:100%;height:100%;background:#060610;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:3px;}
  .t-col{display:flex;flex-direction:column;gap:3px;animation:t-fall linear infinite;}
  @keyframes t-fall{0%{transform:translateY(-100%)}100%{transform:translateY(200%)}}
  .t-block{width:20px;height:20px;border-radius:1px;flex-shrink:0;}
  /* Flappy — Arcane tarzı */
  .flappy-scene{width:100%;height:100%;background:linear-gradient(180deg,#04020e 0%,#080418 60%,#050210 100%);position:relative;overflow:hidden;}
  .flappy-ground{position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(180deg,#1a0a2e,#0a0418);border-top:2px solid #cc66ff;box-shadow:0 0 10px rgba(170,68,255,0.5);}
  .flappy-bird{position:absolute;left:25%;font-size:1.6rem;animation:bird-fly 1.4s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(255,190,11,0.9));}
  @keyframes bird-fly{0%,100%{top:38%;transform:rotate(-10deg)}50%{top:28%;transform:rotate(8deg)}}
  /* Arcane boru */
  .flappy-pipe{position:absolute;width:26px;animation:pipe-move 3s linear infinite;}
  @keyframes pipe-move{0%{left:110%}100%{left:-10%}}
  .flappy-star{position:absolute;width:2px;height:2px;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:0.9}}
  /* Dragon */
  .dragon-scene{width:100%;height:100%;background:#060610;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @media(max-width:480px){.games-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="pixels" id="pixels"></div>
<div class="ticker"><div class="ticker-inner" id="ticker-inner"></div></div>

<header>
  <div class="logo">
    <span class="logo-bedava">BEDAVA</span><span class="logo-oyun">OYUN</span>
    <span class="logo-sub">★ ücretsiz tarayıcı oyunları ★</span>
  </div>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="section-title"><h2>OYUNLAR</h2></div>
<div class="games-grid" id="games-grid"></div>

<footer>
  <div>BedavaOyun © 2025 — Tüm oyunlar ücretsizdir</div>
  <div style="margin-top:6px;font-size:0.28rem;">Tarayıcıdan oyna • İndirme yok • Kayıt yok</div>
</footer>

<script>
const OYUNLAR = [
  {
    isim: "TETRİS",
    aciklama: "Klasik blok dizme oyunu! Satırları doldur, patlat, rekor kır. Neon efektler ve retro müzik.",
    link: "https://tahaenessoylemez21-star.github.io/Tetris/",
    etiketler: ["BULMACA","KLASİK","MÜZİK","MOBİL"],
    rozet: "YENİ",
    renk: "cyan",
    preview: "tetris",
  },
  {
    isim: "FLAPPY PARS",
    aciklama: "Pars'ı engellerin arasından geçir! 🪙 Altın topla, rekor kır. Global liderlik tablosu!",
    link: "https://tahaenessoylemez21-star.github.io/Flappy-Pars/",
    etiketler: ["AKSİYON","ALTIN","LİDERLİK","MOBİL"],
    rozet: "HOT",
    renk: "pink",
    preview: "flappy",
  },
  {
    isim: "NEON EJDERHA",
    aciklama: "Ejderhayı yönlendir! 🪙 Altın topla, ⭐ güç kazan, 🧱 duvarlardan kaç! Global liderlik.",
    link: "https://tahaenessoylemez21-star.github.io/NeonEjderha/",
    etiketler: ["AKSİYON","ALTIN","GÜÇLER","MOBİL"],
    rozet: "YENİ",
    renk: "green",
    preview: "dragon",
  },
];

const aktif=OYUNLAR.filter(o=>o.link).length;
document.getElementById('header-stats').innerHTML=`
  <div class="stat-chip">🎮 ${aktif} OYUN</div>
  <div class="stat-chip">⚡ ANINDA OYNA</div>
  <div class="stat-chip">📱 MOBİL UYUMLU</div>`;

const oyunIsimleri=OYUNLAR.map(o=>`<span>${o.isim}</span>`).join(' &nbsp;&nbsp; ');
const tickerMsg=`★ BEDAVAOYUN ★ &nbsp;&nbsp; ÜCRETSİZ OYNA &nbsp;&nbsp; ${oyunIsimleri} &nbsp;&nbsp; YAKINDA DAHA FAZLASI &nbsp;&nbsp; `;
document.getElementById('ticker-inner').innerHTML=(tickerMsg+tickerMsg).repeat(2);

// Arcane pipe renkleri döngüsü
const arcaneHues=[260,300,200,180,320];
let hueIdx=0;

const grid=document.getElementById('games-grid');
OYUNLAR.forEach((oyun,i)=>{
  const coming=!oyun.link;
  const card=document.createElement('div');
  card.className=`game-card ${oyun.renk||''} ${coming?'coming':''}`;
  card.style.animationDelay=(i*0.1+0.1)+'s';
  if(!coming)card.onclick=()=>window.open(oyun.link,'_blank');

  const rozetClass=oyun.rozet==='HOT'?'badge-hot':oyun.rozet==='YENİ'?'badge-new':'badge-soon';
  const rozetText=oyun.rozet==='HOT'?'🔥 HOT':oyun.rozet==='YENİ'?'YENİ':'🔒 YAKINDA';

  let previewHTML='';
  if(oyun.preview==='tetris'){
    previewHTML=`<div class="tetris-scene" id="ts-${i}"></div>`;
  }else if(oyun.preview==='flappy'){
    // ✅ Arcane tarzı önizleme
    previewHTML=`
      <div class="flappy-scene" id="fs-${i}">
        <div class="flappy-bird">🐆</div>
        <div class="flappy-ground"></div>
      </div>`;
  }else if(oyun.preview==='dragon'){
    previewHTML=`<div class="dragon-scene" id="ds-${i}"><span style="font-size:3rem;animation:bounce 1s ease-in-out infinite;">🐉</span></div>`;
  }else{
    previewHTML=`<div style="text-align:center;font-size:3rem;opacity:0.3;">🎮</div>`;
  }

  const etiketHTML=oyun.etiketler.map(e=>`<span class="tag">${e}</span>`).join('');
  card.innerHTML=`
    <div class="card-preview">
      ${previewHTML}
      <div class="card-badge ${rozetClass}">${rozetText}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${oyun.isim}</div>
      <div class="card-desc">${oyun.aciklama}</div>
      <div class="card-tags">${etiketHTML}</div>
    </div>
    <div class="card-footer"><div class="play-btn">${coming?'🔒 YAKINDA':'▶ OYNA'}</div></div>`;
  grid.appendChild(card);
});

// Pixels
const colors=['#00f5ff','#ff006e','#ffbe0b','#00ff88','#cc00ff'];
const pixelsEl=document.getElementById('pixels');
for(let i=0;i<40;i++){
  const p=document.createElement('div');
  p.className='pixel';
  p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;animation-duration:${8+Math.random()*16}s;animation-delay:${-Math.random()*20}s;`;
  pixelsEl.appendChild(p);
}

// Tetris
const blockColors=['#00f5ff','#ffbe0b','#cc00ff','#ff6b00','#0088ff','#00ff88','#ff006e'];
document.querySelectorAll('[id^="ts-"]').forEach(scene=>{
  for(let c=0;c<9;c++){
    const col=document.createElement('div');col.className='t-col';
    for(let b=0;b<6+Math.floor(Math.random()*5);b++){
      const block=document.createElement('div');block.className='t-block';
      const color=blockColors[Math.floor(Math.random()*blockColors.length)];
      block.style.cssText=`color:${color};background:${color}22;border:1px solid ${color};box-shadow:0 0 6px ${color};`;
      col.appendChild(block);
    }
    col.style.animationDuration=(4+Math.random()*6)+'s';
    col.style.animationDelay=(-Math.random()*8)+'s';
    scene.appendChild(col);
  }
});

// ✅ Flappy arcane önizleme — JS ile arcane borular ekle
document.querySelectorAll('[id^="fs-"]').forEach(scene=>{
  // Yıldızlar
  for(let i=0;i<25;i++){
    const star=document.createElement('div');
    star.className='flappy-star';
    const c=Math.random()>0.7?'#cc66ff':'#ffffff';
    star.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*70}%;background:${c};animation-delay:${Math.random()*2}s;`;
    scene.appendChild(star);
  }
  // Arcane borular — 2 çift
  const pipeData=[
    {delay:'0s',top:true,height:'55px',hue:260},
    {delay:'0s',top:false,height:'45px',hue:260},
    {delay:'1.5s',top:true,height:'70px',hue:300},
    {delay:'1.5s',top:false,height:'40px',hue:300},
  ];
  pipeData.forEach(pd=>{
    const pipe=document.createElement('div');
    pipe.className='flappy-pipe';
    const h=pd.hue;
    const c1=`hsl(${h},80%,15%)`,c2=`hsl(${h},90%,45%)`;
    pipe.style.cssText=`
      animation-delay:${pd.delay};
      height:${pd.height};
      background:linear-gradient(90deg,${c1},${c2},${c1});
      border:1px solid hsl(${h},100%,55%);
      box-shadow:0 0 12px hsla(${h},100%,60%,0.6);
      ${pd.top?'top:0;':'bottom:20px;'}
    `;
    scene.appendChild(pipe);
  });
});

// Dragon
document.querySelectorAll('[id^="ds-"]').forEach(scene=>{
  const neonColors=['#00ff88','#cc00ff','#00f5ff'];
  for(let i=0;i<6;i++){
    const dot=document.createElement('div');
    const c=neonColors[Math.floor(Math.random()*neonColors.length)];
    dot.style.cssText=`position:absolute;width:4px;height:4px;background:${c};border-radius:50%;box-shadow:0 0 8px ${c};left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;animation:twinkle ${1+Math.random()*2}s ease-in-out infinite;animation-delay:${Math.random()*2}s;`;
    scene.appendChild(dot);
  }
});
</script>
</body>
</html>
